name: Manus Auto Fix\n\non: [push, pull_request]\n\njobs:\n  auto-fix:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v2\n      - name: Set up Node.js\n        uses: actions/setup-node@v2\n        with:\n          node-version: '14'\n      - name: Install dependencies\n        run: npm install\n      - name: Run Type Checks\n        run: npm run type-check\n      - name: Run Tests\n        run: npm test\n      - name: Invoke Manus AI for Code Repair\n        run: npx manus-ai --fix --path .