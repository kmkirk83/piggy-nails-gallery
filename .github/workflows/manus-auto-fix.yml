name: Automated Code Repair & Revision
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  lint-and-fix:
    name: 'Code Repair & Linting'
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📥 Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: ✅ TypeScript Check
        run: pnpm check
        continue-on-error: true

      - name: 🎨 Format Code (Prettier)
        run: pnpm format
        continue-on-error: true

      - name: 🔨 Build Project
        run: pnpm build
        continue-on-error: true

      - name: 🧪 Run Tests
        run: pnpm test
        continue-on-error: true
