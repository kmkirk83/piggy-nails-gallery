name: Manus Auto Fix
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'
      - name: Install pnpm dependencies
        run: npm install -g pnpm && pnpm install
      - name: TypeScript Compilation Check
        run: pnpm run tsc --noEmit
      - name: Format Check with Prettier
        run: pnpm run prettier --check .
      - name: Build Project
        run: pnpm run build
      - name: Run Tests
        run: pnpm test
      - name: Auto Fix and Push Changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          pnpm run fix
          git add .
          git commit -m 'Automatic fixes' || echo 'No changes to commit'
          git push
      - name: Create Pull Request for Review
        uses: peter-evans/create-pull-request@v3
        with:
          title: 'Automated Fixes'
          body: 'This PR includes automated fixes.'
          base: main
          head: auto-fix
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Auto-complete workflow on success
        if: ${{ success() }}
        run: echo 'Workflow completed successfully!'