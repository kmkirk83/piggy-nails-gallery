name: Build and Deploy to Google Play

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'server/**'
      - 'app.json'
      - 'eas.json'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:
    inputs:
      track:
        description: 'Release track (internal, alpha, beta, production)'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install global dependencies
        run: |
          npm install -g eas-cli expo-cli
      
      - name: Install project dependencies
        run: npm install
      
      - name: Login to Expo
        run: |
          eas login --username ${{ secrets.EXPO_USERNAME }} --password ${{ secrets.EXPO_PASSWORD }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      
      - name: Build Android AAB (Production)
        run: |
          eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      
      - name: Get build artifact
        run: |
          BUILD_ID=$(eas build list --json --limit 1 | jq -r '.[0].id')
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV
          eas build:download --id $BUILD_ID --path ./app.aab
      
      - name: Upload to Google Play Console
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_KEY }}
          packageName: com.nailed.app
          releaseFiles: './app.aab'
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          inAppUpdatePriority: 3
      
      - name: Notify on success
        if: success()
        run: |
          echo "✅ Build and deployment successful!"
          echo "Build ID: ${{ env.BUILD_ID }}"
          echo "Track: ${{ github.event.inputs.track || 'internal' }}"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Build or deployment failed"
          exit 1

  notify:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    
    steps:
      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Nail'd Mobile Build",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Nail'd Mobile Build*\nStatus: ${{ needs.build.result }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
