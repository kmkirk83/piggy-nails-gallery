name: Build Signed APK

on:
  push:
    branches:
      - main
      - eas-update
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync web assets to Capacitor
        run: pnpm exec capacitor sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Build signed APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=app/release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Get APK download URL
        id: artifact
        run: |
          echo "artifact_url=https://github.com/kmkirk83/piggy-nails-gallery/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "commit=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Nail'd APK Build Complete - Ready for Download"
          to: ${{ secrets.EMAIL_RECIPIENT }}
          from: "Nail'd Build System <${{ secrets.EMAIL_USER }}>"
          body: |
            🎉 Your APK build is complete!
            
            Build Details:
            - Branch: ${{ steps.artifact.outputs.branch }}
            - Commit: ${{ steps.artifact.outputs.commit }}
            - Build ID: ${{ github.run_id }}
            
            📥 Download Your APK:
            ${{ steps.artifact.outputs.artifact_url }}
            
            Steps to download:
            1. Click the link above
            2. Scroll down to "Artifacts" section
            3. Click "app-release-apk" to download
            
            🚀 Next Steps:
            1. Download the APK
            2. Test on an Android device
            3. Upload to Google Play Console
            
            Build Log: https://github.com/kmkirk83/piggy-nails-gallery/actions/runs/${{ github.run_id }}
            
            ---
            Nail'd Build System
          html_body: |
            <div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
              <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; color: white; border-radius: 8px 8px 0 0;">
                <h1 style="margin: 0; font-size: 24px;">🎉 APK Build Complete!</h1>
              </div>
              
              <div style="background: #f5f5f5; padding: 20px; border-radius: 0 0 8px 8px;">
                <p style="color: #333; font-size: 16px;">Your Nail'd APK is ready for download.</p>
                
                <div style="background: white; padding: 15px; border-left: 4px solid #667eea; margin: 20px 0;">
                  <p><strong>Build Details:</strong></p>
                  <ul style="margin: 10px 0; padding-left: 20px;">
                    <li>Branch: <code>${{ steps.artifact.outputs.branch }}</code></li>
                    <li>Commit: <code>${{ steps.artifact.outputs.commit }}</code></li>
                    <li>Build ID: <code>${{ github.run_id }}</code></li>
                  </ul>
                </div>
                
                <div style="text-align: center; margin: 30px 0;">
                  <a href="${{ steps.artifact.outputs.artifact_url }}" style="display: inline-block; background: #667eea; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; font-weight: bold;">
                    📥 Download APK
                  </a>
                </div>
                
                <div style="background: #e8f4f8; padding: 15px; border-radius: 5px; margin: 20px 0;">
                  <p><strong>📋 How to Download:</strong></p>
                  <ol style="margin: 10px 0; padding-left: 20px;">
                    <li>Click the "Download APK" button above</li>
                    <li>Scroll to the "Artifacts" section</li>
                    <li>Click "app-release-apk" to download</li>
                  </ol>
                </div>
                
                <div style="background: #fff3cd; padding: 15px; border-radius: 5px; margin: 20px 0;">
                  <p><strong>🚀 Next Steps:</strong></p>
                  <ol style="margin: 10px 0; padding-left: 20px;">
                    <li>Download and test the APK on an Android device</li>
                    <li>Upload to Google Play Console</li>
                    <li>Submit for review</li>
                  </ol>
                </div>
                
                <p style="color: #666; font-size: 12px; margin-top: 30px; text-align: center;">
                  <a href="https://github.com/kmkirk83/piggy-nails-gallery/actions/runs/${{ github.run_id }}" style="color: #667eea;">View Full Build Log</a>
                </p>
              </div>
            </div>

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Nail'd APK Build Failed"
          to: ${{ secrets.EMAIL_RECIPIENT }}
          from: "Nail'd Build System <${{ secrets.EMAIL_USER }}>"
          body: |
            ❌ Your APK build failed!
            
            Build Details:
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Build ID: ${{ github.run_id }}
            
            View the full build log:
            https://github.com/kmkirk83/piggy-nails-gallery/actions/runs/${{ github.run_id }}
            
            Please check the logs and try again.
            
            ---
            Nail'd Build System
