name: Build Signed APK

on:
  push:
    branches:
      - main
      - eas-update
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web app
        run: pnpm build

      - name: Sync web assets to Capacitor
        run: pnpm exec cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            echo "Keystore decoded from secret"
          else
            echo "KEYSTORE_BASE64 secret not set — using repository keystore"
          fi

      - name: Build signed APK
        env:
          ORG_GRADLE_PROJECT_signingStoreFile: ${{ github.workspace }}/android/app/release.keystore
          ORG_GRADLE_PROJECT_signingStorePass: ${{ secrets.KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKeyAlias: ${{ secrets.KEY_ALIAS }}
          ORG_GRADLE_PROJECT_signingKeyPass: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: List build outputs
        run: find android/app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
